aid: osmapi
url: https://raw.githubusercontent.com/api-evangelist/osmapi/refs/heads/main/apis.yml
modified: '2026-03-24'
apis:
  - aid: osmapi:chat-completions-api
    name: osmAPI Chat Completions API
    tags:
      - Artificial Intelligence
      - Chat
      - Completions
      - Large Language Models
      - AI Gateway
      - Multi-Provider
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.osmapi.com/v1
    humanURL: https://docs.osmapi.com/v1_chat_completions
    properties:
      - url: https://docs.osmapi.com/v1_chat_completions
        type: Documentation
      - url: openapi/osmapi-chat-completions-openapi.yml
        type: OpenAPI
    description: >-
      The osmAPI Chat Completions API provides an OpenAI-compatible endpoint
      for sending chat completion requests routed through osmAPI's unified AI
      gateway. It supports multi-turn conversations, function calling, streaming,
      structured output, web search, response healing, and smart routing across
      OpenAI, Anthropic, Google, and 14+ LLM providers. The endpoint
      automatically selects the best provider based on availability, speed,
      cost, and latency, with automatic failover protection.
  - aid: osmapi:anthropic-messages-api
    name: osmAPI Anthropic Messages API
    tags:
      - Artificial Intelligence
      - Anthropic
      - Claude
      - Messages
      - Large Language Models
      - AI Gateway
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.osmapi.com/v1
    humanURL: https://docs.osmapi.com/v1_messages
    properties:
      - url: https://docs.osmapi.com/v1_messages
        type: Documentation
      - url: openapi/osmapi-anthropic-messages-openapi.yml
        type: OpenAPI
    description: >-
      The osmAPI Anthropic Messages API provides an Anthropic-compatible
      endpoint for sending message requests to Claude models through osmAPI's
      unified AI gateway. It supports the native Anthropic message format
      including system prompts, extended thinking, tool use, and streaming,
      allowing developers to use the Anthropic API format while benefiting
      from osmAPI's smart routing, cost tracking, and failover capabilities.
  - aid: osmapi:models-api
    name: osmAPI Models API
    tags:
      - Artificial Intelligence
      - Models
      - Model Discovery
      - AI Gateway
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.osmapi.com/v1
    humanURL: https://docs.osmapi.com/v1_models
    properties:
      - url: https://docs.osmapi.com/v1_models
        type: Documentation
      - url: openapi/osmapi-models-openapi.yml
        type: OpenAPI
    description: >-
      The osmAPI Models API provides an endpoint for listing all available AI
      models accessible through the osmAPI gateway. It returns detailed
      information about each model including pricing, context length, supported
      parameters, input and output modalities, provider details, and
      deprecation status. The endpoint supports filtering to include deactivated
      or exclude deprecated models.
  - aid: osmapi:health-api
    name: osmAPI Health API
    tags:
      - Health Check
      - Monitoring
      - Status
      - Infrastructure
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.osmapi.com
    humanURL: https://docs.osmapi.com/health
    properties:
      - url: https://docs.osmapi.com/health
        type: Documentation
      - url: openapi/osmapi-health-openapi.yml
        type: OpenAPI
    description: >-
      The osmAPI Health API provides a health check endpoint that reports the
      operational status of the osmAPI service, including connectivity to Redis
      and database dependencies. It can be used for monitoring and alerting
      to ensure the gateway is functioning correctly.
