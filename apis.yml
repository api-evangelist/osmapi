aid: osmapi
name: osmAPI
description: osmAPI is a unified AI gateway that routes requests to OpenAI, Anthropic, Google, and 14+ LLM providers through
  a single API. Drop-in compatible with the OpenAI SDK, it provides smart routing, streaming, function calling, web search,
  response healing, embeddings, audio, and realtime endpoints.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
