naftiko: 1.0.0-alpha2
info:
  label: osmAPI Anthropic Messages API — Messages
  description: 'osmAPI Anthropic Messages API — Messages. 1 operations. Lead operation: Create a message. Self-contained Naftiko
    capability covering one Osmapi business surface.'
  tags:
  - Osmapi
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OSMAPI_API_KEY: OSMAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: anthropic-messages-messages
    baseUri: https://api.osmapi.com/v1
    description: osmAPI Anthropic Messages API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages
      path: /messages
      operations:
      - name: createmessage
        method: POST
        description: Create a message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OSMAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: anthropic-messages-messages-rest
    port: 8080
    description: REST adapter for osmAPI Anthropic Messages API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/messages
      name: messages
      description: REST surface for messages.
      operations:
      - method: POST
        name: createmessage
        description: Create a message
        call: anthropic-messages-messages.createmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: anthropic-messages-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for osmAPI Anthropic Messages API — Messages. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-message
      description: Create a message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: anthropic-messages-messages.createmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
