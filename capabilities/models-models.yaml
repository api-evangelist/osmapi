naftiko: 1.0.0-alpha2
info:
  label: osmAPI Models API — Models
  description: 'osmAPI Models API — Models. 1 operations. Lead operation: List available models. Self-contained Naftiko capability
    covering one Osmapi business surface.'
  tags:
  - Osmapi
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OSMAPI_API_KEY: OSMAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: models-models
    baseUri: https://api.osmapi.com/v1
    description: osmAPI Models API — Models business capability. Self-contained, no shared references.
    resources:
    - name: models
      path: /models
      operations:
      - name: listmodels
        method: GET
        description: List available models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include_deactivated
          in: query
          type: string
          description: Include deactivated models in the response
        - name: exclude_deprecated
          in: query
          type: string
          description: Exclude deprecated models from the response
  exposes:
  - type: rest
    namespace: models-models-rest
    port: 8080
    description: REST adapter for osmAPI Models API — Models. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for models.
      operations:
      - method: GET
        name: listmodels
        description: List available models
        call: models-models.listmodels
        with:
          include_deactivated: rest.include_deactivated
          exclude_deprecated: rest.exclude_deprecated
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: models-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for osmAPI Models API — Models. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-available-models
      description: List available models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: models-models.listmodels
      with:
        include_deactivated: tools.include_deactivated
        exclude_deprecated: tools.exclude_deprecated
      outputParameters:
      - type: object
        mapping: $.
