specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: osmAPI
providerId: osmapi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AI
  - LLM
  - Gateway
description: FOCUS-aligned FinOps definition for osmAPI. Pure pay-as-you-go pass-through model
  where each request returns its underlying-provider cost in the response, charged against
  prepaid credits.
sources:
  - https://docs.osmapi.com/features/cost-breakdown
  - https://docs.osmapi.com/resources/rate-limits
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: osmAPI
serviceCategory: AI Infrastructure
billingModel:
  pricingCategory: Pay-As-You-Go (Prepaid Credit)
  billingFrequency: Continuous Settlement
  billingCurrency: USD (settlement); INR (top-up via Razorpay)
  chargeCategories:
    - Usage
    - Purchase
    - Credit
focusColumns:
  ServiceName: osmAPI
  ServiceCategory: AI Infrastructure
  ProviderName: osmAPI
  PublisherName: osmAPI
  InvoiceIssuerName: osmAPI
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: tokens_input
    description: Input/prompt tokens routed to upstream LLM provider
    unit: token
    aggregation: sum
    dimensions:
      - model
      - upstream_provider
      - api_key
  - name: tokens_output
    description: Output/completion tokens returned by upstream LLM provider
    unit: token
    aggregation: sum
    dimensions:
      - model
      - upstream_provider
      - api_key
  - name: api_requests
    description: Total request count for rate-limit accounting
    unit: request
    aggregation: count
    dimensions:
      - model
      - api_key
      - endpoint
  - name: credit_topup
    description: Prepaid credit purchased via Razorpay, denominated in INR and converted to
      USD on use
    unit: INR
    aggregation: sum
    dimensions:
      - account
  - name: credit_consumed
    description: Credit drawn down by usage at upstream-provider rates
    unit: USD
    aggregation: sum
    dimensions:
      - account
      - model
principles:
  - name: Visibility
    description: Every API response embeds cost data so consumers can track spend programmatically
      per request. The dashboard at app.osmapi.com surfaces aggregate consumption.
  - name: Allocation
    description: Use distinct API keys per app/team to attribute token spend; the response-embedded
      cost field can be logged to a downstream warehouse keyed by api_key, model, and consumer.
  - name: Optimization
    description: Route low-stakes/dev workloads to free models (200 rpm), reserve paid models
      for production. Use osmAPI's smart routing to pick lowest-cost provider for a given
      capability, and turn on response caching where applicable.
  - name: Accountability
    description: Each API key should map to a budget owner. Monitor credit balance proactively;
      account credit depletion stops further usage until top-up.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
