specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: osmAPI
providerId: osmapi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - AI
  - LLM
  - Gateway
description: osmAPI applies per-API-key rate limits with separate ceilings for free and paid
  models. Free models share a 200 rpm budget; paid models default to 1000 rpm per key with
  Enterprise able to negotiate higher. Real throughput is also bounded by upstream provider
  capacity and account credit balance. Free model responses include rate-limit telemetry
  headers.
sources:
  - https://docs.osmapi.com/resources/rate-limits
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free Models - Default
    scope: api-key
    metric: requests_per_minute
    limit: 200
    timeFrame: minute
    notes: Applies to all users on free models. Window resets every 60 seconds.
  - name: Paid Models - Default
    scope: api-key
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
    notes: Default for paid model access. Actual throughput also bounded by credit balance
      and upstream provider limits.
  - name: Enterprise - Negotiated
    scope: account
    metric: requests_per_minute
    limit: contact sales for higher than 1000 rpm
    notes: Enterprise customers can negotiate higher per-key throughput.
policies:
  - name: Backoff
    description: When 429 is returned, clients should pause and retry using exponential backoff,
      honoring the Retry-After header value.
  - name: Header-Driven Throttling
    description: Free model responses include X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset
      and Retry-After. Clients should read these headers to pace requests and avoid throttling.
  - name: Free vs Paid Routing
    description: osmAPI recommends reserving free models for development and routing production
      workloads to paid models for higher throughput.
  - name: Upstream Provider Limits
    description: Even within osmAPI's published per-key limits, upstream provider rate limits
      (OpenAI, Anthropic, Google, Groq, etc.) and account credit balance can further bound
      throughput.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
